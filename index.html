<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Cisterna</title>
    <!-- Tailwind CSS per lo stile -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons per le icone -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Dipendenze per i Grafici (Recharts) -->
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    
    <!-- Babel per processare JSX nel browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-100 font-sans antialiased text-slate-800 selection:bg-blue-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        
        // Assicuriamoci che la libreria dei grafici si carichi correttamente
        const { ResponsiveContainer, AreaChart, Area, XAxis, YAxis, Tooltip, CartesianGrid } = window.Recharts || {};

        function App() {
            const [supabaseUrl, setSupabaseUrl] = useState(localStorage.getItem('water_supa_url') || '');
            const [supabaseKey, setSupabaseKey] = useState(localStorage.getItem('water_supa_key') || '');
            const [isConfigured, setIsConfigured] = useState(!!localStorage.getItem('water_supa_url'));

            const [currentFlow, setCurrentFlow] = useState(0);
            const [isActive, setIsActive] = useState(false);
            const [totalLiters, setTotalLiters] = useState(0);
            const [history, setHistory] = useState([]);
            
            const [chartData, setChartData] = useState([]); 
            
            const [lastUpdate, setLastUpdate] = useState(null);
            const [error, setError] = useState(null);

            const handleSaveConfig = (e) => {
                e.preventDefault();
                localStorage.setItem('water_supa_url', supabaseUrl.trim());
                localStorage.setItem('water_supa_key', supabaseKey.trim());
                setIsConfigured(true);
                setError(null);
            };

            const handleResetConfig = () => {
                localStorage.removeItem('water_supa_url');
                localStorage.removeItem('water_supa_key');
                setIsConfigured(false);
                setHistory([]);
                setChartData([]);
                setCurrentFlow(0);
                setTotalLiters(0);
                setIsActive(false);
            };

            const fetchData = useCallback(async () => {
    if (!isConfigured) return;

    try {
        // 1. Calcoliamo l'orario di "mezzanotte di oggi"
        const startOfDay = new Date();
        startOfDay.setHours(0, 0, 0, 0);
        // Convertiamo la data nel formato compreso dal database (ISO 8601)
        const isoStart = startOfDay.toISOString();

        // 2. Chiediamo a Supabase solo i record creati DOPO la mezzanotte di oggi
        // Abbiamo sostituito limit=500 con creato_il=gte.${isoStart} (gte = Greater Than or Equal)
        // Manteniamo un limite alto (es. 2000) per evitare di bloccare il server se ci sono troppi dati
        const response = await fetch(`${supabaseUrl}?select=*&order=id.desc&creato_il=gte.${isoStart}&limit=2000`, {
            headers: {
                'apikey': supabaseKey,
                'Authorization': `Bearer ${supabaseKey}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=representation'
            }
        });

        if (!response.ok) throw new Error(`Errore: ${response.status}`);

        const data = await response.json();
        
        if (data && data.length > 0) {
            const latest = data[0];
            setCurrentFlow(latest.portata || 0);
            setIsActive(latest.in_funzione || false);
            const calculatedTotal = data.reduce((sum, item) => sum + (Number(item.litri_caricati) || 0), 0);
            setTotalLiters(calculatedTotal);
            setHistory(data);

            // Formattiamo i dati per Recharts
            const formattedForChart = data.map(item => ({
                orario: new Date(item.creato_il).toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' }),
                portata: Number(item.portata)
            })).reverse(); 
            
            setChartData(formattedForChart);

            setLastUpdate(new Date());
            setError(null);
        } else {
            // Se non ci sono dati per oggi (es. subito dopo mezzanotte), azzeriamo l'interfaccia
            setHistory([]);
            setChartData([]);
            setCurrentFlow(0);
            setTotalLiters(0);
            setIsActive(false);
            setLastUpdate(new Date());
        }
    } catch (err) {
        setError("Impossibile connettersi al database. Verifica i dati di Supabase.");
    }
}, [supabaseUrl, supabaseKey, isConfigured]);
            
            useEffect(() => {
                fetchData();
                if (isConfigured) {
                    const interval = setInterval(fetchData, 3000);
                    return () => clearInterval(interval);
                }
            }, [fetchData, isConfigured]);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            // Calcolo delle statistiche avanzate basato sullo storico
            const stats = React.useMemo(() => {
                if (!history || history.length === 0) return null;

                const newest = history[0];
                const oldest = history[history.length - 1];
                
                // Modificato qui per usare creato_il
                const startDate = new Date(oldest.creato_il);
                const endDate = new Date(newest.creato_il);
                
                const formatDate = (d) => {
                    const time = d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
                    const date = d.toLocaleDateString('it-IT', { day: '2-digit', month: 'short', year: 'numeric' });
                    return `${time} del ${date}`;
                };

                const activeReadings = history.filter(r => r.in_funzione);
                const activeCount = activeReadings.length;
                
                const maxFlow = Math.max(...history.map(r => Number(r.portata) || 0));
                const sumLiters = history.reduce((sum, r) => sum + (Number(r.litri_caricati) || 0), 0);
                
                const sumFlowActive = activeReadings.reduce((sum, r) => sum + (Number(r.portata) || 0), 0);
                const avgFlow = activeCount > 0 ? (sumFlowActive / activeCount) : 0;

                return {
                    start: formatDate(startDate),
                    end: formatDate(endDate),
                    total: history.length,
                    active: activeCount,
                    liters: sumLiters.toFixed(2),
                    maxFlow: maxFlow.toFixed(2),
                    avgFlow: avgFlow.toFixed(2)
                };
            }, [history]);

            if (!isConfigured) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4">
                        <div className="bg-white rounded-3xl shadow-xl p-8 max-w-md w-full border border-slate-100">
                            <div className="flex items-center justify-center w-16 h-16 bg-blue-100 text-blue-600 rounded-full mb-6 mx-auto">
                                <i data-lucide="droplets" className="w-8 h-8"></i>
                            </div>
                            <h1 className="text-2xl font-bold text-center mb-2">Monitor Cisterna</h1>
                            <p className="text-slate-500 text-center mb-8">Connetti il tuo database Supabase.</p>
                            
                            <form onSubmit={handleSaveConfig} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-semibold text-slate-700 mb-1">URL Tabella</label>
                                    <input type="url" required placeholder="https://...supabase.co/rest/v1/lettura_acqua"
                                        className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                                        value={supabaseUrl} onChange={(e) => setSupabaseUrl(e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-slate-700 mb-1">Chiave API (anon)</label>
                                    <input type="password" required placeholder="eyJhb..."
                                        className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                                        value={supabaseKey} onChange={(e) => setSupabaseKey(e.target.value)} />
                                </div>
                                <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition-colors mt-2 shadow-lg shadow-blue-200">
                                    Connetti
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8 space-y-6">
                    <header className="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                        <div className="flex items-center gap-3">
                            <div className="p-2 bg-gradient-to-br from-blue-500 to-blue-600 text-white rounded-xl shadow-sm">
                                <i data-lucide="droplets"></i>
                            </div>
                            <h1 className="text-xl font-bold">Cisterna Casa</h1>
                        </div>
                        <button onClick={handleResetConfig} className="p-2 text-slate-400 hover:text-slate-700 hover:bg-slate-50 rounded-xl transition-all" title="Impostazioni">
                            <i data-lucide="settings"></i>
                        </button>
                    </header>

                    {error && (
                        <div className="bg-red-50 border border-red-100 p-4 rounded-2xl flex items-center gap-3 text-red-600">
                            <i data-lucide="alert-circle"></i>
                            <p className="font-medium">{error}</p>
                        </div>
                    )}

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {/* Stato Impianto */}
                        <div className="bg-white rounded-3xl shadow-sm border border-slate-100 flex flex-col items-center justify-center p-8 text-center relative min-h-[320px]">
                            <div className={`absolute top-5 right-5 flex items-center gap-2 text-xs font-bold px-3 py-1.5 rounded-full ${isActive ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-500'}`}>
                                <div className={`w-2 h-2 rounded-full ${isActive ? 'bg-green-500 animate-pulse' : 'bg-slate-400'}`}></div>
                                {isActive ? 'ONLINE' : 'STANDBY'}
                            </div>

                            <div className={`w-32 h-32 rounded-full flex items-center justify-center mb-6 transition-all duration-700 ${isActive ? 'bg-blue-50 text-blue-500 shadow-[0_0_50px_rgba(59,130,246,0.2)]' : 'bg-slate-50 text-slate-300'}`}>
                                {isActive ? <i data-lucide="waves" className="w-16 h-16 animate-bounce"></i> : <i data-lucide="power-off" className="w-16 h-16"></i>}
                            </div>
                            
                            <h2 className="text-3xl font-extrabold text-slate-800 mb-2">
                                {isActive ? 'Acqua in Ingresso' : 'Flusso Assente'}
                            </h2>
                            <p className="text-slate-500 font-medium">
                                {isActive ? 'La rete diretta sta alimentando il serbatoio.' : 'Nessuna fornitura idrica al momento.'}
                            </p>
                        </div>

                        <div className="space-y-6 flex flex-col">
                            {/* Dati in tempo reale */}
                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-white rounded-3xl shadow-sm p-6 border border-slate-100 flex flex-col justify-center">
                                    <div className="flex items-center gap-2 text-slate-400 mb-2">
                                        <i data-lucide="activity" className="w-5 h-5"></i>
                                        <h3 className="font-semibold text-sm uppercase tracking-wider">Portata</h3>
                                    </div>
                                    <div className="flex items-baseline gap-1">
                                        <span className={`text-4xl font-black tracking-tight ${isActive ? 'text-blue-600' : 'text-slate-300'}`}>
                                            {currentFlow.toFixed(1)}
                                        </span>
                                        <span className="text-sm font-bold text-slate-400">L/m</span>
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl shadow-sm p-6 border border-slate-100 flex flex-col justify-center relative overflow-hidden">
                                    <div className="absolute -right-4 -bottom-4 opacity-5 text-blue-600">
                                        <i data-lucide="glass-water" className="w-32 h-32"></i>
                                    </div>
                                    <div className="flex items-center gap-2 text-blue-500 mb-2 relative z-10">
                                        <i data-lucide="glass-water" className="w-5 h-5"></i>
                                        <h3 className="font-semibold text-sm uppercase tracking-wider">Caricati</h3>
                                    </div>
                                    <div className="flex items-baseline gap-1 relative z-10">
                                        <span className={`text-4xl font-black tracking-tight ${totalLiters > 0 ? 'text-blue-600' : 'text-slate-300'}`}>
                                            {totalLiters.toFixed(1)}
                                        </span>
                                        <span className="text-sm font-bold text-slate-400">Litri</span>
                                    </div>
                                </div>
                            </div>

                            {/* Cronologia */}
                            <div className="bg-white rounded-3xl shadow-sm p-6 border border-slate-100 flex-grow">
                                <div className="flex justify-between items-center mb-4 pb-2 border-b border-slate-100">
                                    <div className="flex items-center gap-2 text-slate-400">
                                        <i data-lucide="history" className="w-5 h-5"></i>
                                        <h3 className="font-semibold text-sm uppercase tracking-wider">Ultime Letture</h3>
                                    </div>
                                    {lastUpdate && (
                                        <span className="text-xs font-semibold text-green-500 bg-green-50 px-2 py-1 rounded-md flex items-center gap-1">
                                            <i data-lucide="check-circle-2" className="w-3 h-3"></i> 
                                            {lastUpdate.toLocaleTimeString()}
                                        </span>
                                    )}
                                </div>
                                <div className="space-y-2">
                                    {history.length > 0 ? history.slice(0, 4).map((record) => (
                                        <div key={record.id} className="flex justify-between items-center p-3 hover:bg-slate-50 rounded-xl transition-colors border border-transparent hover:border-slate-100">
                                            {/* Modificato qui per usare creato_il */}
                                            <span className="text-slate-400 font-mono text-sm">{new Date(record.creato_il).toLocaleTimeString()}</span>
                                            <div className="flex gap-4">
                                                <span className={`font-bold ${record.in_funzione ? 'text-blue-600' : 'text-slate-400'}`}>
                                                    {Number(record.portata).toFixed(1)} <span className="text-xs opacity-70">L/m</span>
                                                </span>
                                                <span className="font-bold text-slate-600 w-16 text-right">
                                                    {record.litri_caricati ? Number(record.litri_caricati).toFixed(1) : '0.0'} <span className="text-xs opacity-70">L</span>
                                                </span>
                                            </div>
                                        </div>
                                    )) : (
                                        <p className="text-slate-400 text-sm text-center py-6">Nessun dato registrato</p>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Sezione Statistiche Principali */}
                    {stats && (
                        <div className="bg-white rounded-3xl shadow-sm p-6 border border-slate-100 mt-6">
                            <div className="flex items-center gap-3 text-slate-700 mb-6 border-b border-slate-100 pb-4">
                                <div className="p-2 bg-indigo-50 text-indigo-600 rounded-lg">
                                    <i data-lucide="clipboard-list" className="w-5 h-5"></i>
                                </div>
                                <h3 className="font-bold text-lg">Statistiche Principali</h3>
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="space-y-4">
                                    <div>
                                        <p className="text-xs text-slate-400 font-bold uppercase tracking-wider mb-1">Periodo di rilevazione</p>
                                        <p className="text-sm font-medium text-slate-700">
                                            Da <span className="font-bold">{stats.start}</span><br/>
                                            alle <span className="font-bold">{stats.end}</span>
                                        </p>
                                    </div>
                                    <div>
                                        <p className="text-xs text-slate-400 font-bold uppercase tracking-wider mb-1">Totale letture</p>
                                        <p className="text-lg font-bold text-slate-700">{stats.total} misurazioni</p>
                                    </div>
                                    <div>
                                        <p className="text-xs text-slate-400 font-bold uppercase tracking-wider mb-1">Stato del sistema</p>
                                        <p className="text-sm font-medium text-slate-700">
                                            L'impianto è risultato in funzione in <span className="font-bold text-blue-600">{stats.active}</span> su {stats.total} rilevazioni.
                                        </p>
                                    </div>
                                </div>
                                
                                <div className="space-y-4 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                    <div className="flex justify-between items-center border-b border-slate-200 pb-2">
                                        <p className="text-sm text-slate-500 font-semibold">Litri totali caricati</p>
                                        <p className="text-lg font-bold text-blue-600">{stats.liters} L</p>
                                    </div>
                                    <div className="flex justify-between items-center border-b border-slate-200 pb-2">
                                        <p className="text-sm text-slate-500 font-semibold">Portata max raggiunta</p>
                                        <p className="text-lg font-bold text-slate-700">{stats.maxFlow} <span className="text-xs font-normal text-slate-400">L/m</span></p>
                                    </div>
                                    <div className="flex justify-between items-center pb-1">
                                        <p className="text-sm text-slate-500 font-semibold">Portata media (attiva)</p>
                                        <p className="text-lg font-bold text-slate-700">{stats.avgFlow} <span className="text-xs font-normal text-slate-400">L/m</span></p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {window.Recharts && (
                        <div className="bg-white rounded-3xl shadow-sm p-6 border border-slate-100 mt-6">
                            <div className="flex items-center gap-3 text-slate-700 mb-6 border-b border-slate-100 pb-4">
                                <div className="p-2 bg-blue-50 text-blue-600 rounded-lg">
                                    <i data-lucide="bar-chart-2" className="w-5 h-5"></i>
                                </div>
                                <h3 className="font-bold text-lg">Andamento Flusso nel Tempo</h3>
                            </div>
                            <div className="h-72 w-full">
                                <ResponsiveContainer width="100%" height="100%">
                                    <AreaChart data={chartData} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                        <defs>
                                            <linearGradient id="colorPortata" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="5%" stopColor="#3b82f6" stopOpacity={0.4}/>
                                                <stop offset="95%" stopColor="#3b82f6" stopOpacity={0}/>
                                            </linearGradient>
                                        </defs>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                                        <XAxis dataKey="orario" stroke="#94a3b8" fontSize={12} tickLine={false} axisLine={false} minTickGap={30} />
                                        <YAxis stroke="#94a3b8" fontSize={12} tickLine={false} axisLine={false} />
                                        <Tooltip 
                                            contentStyle={{ borderRadius: '12px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }}
                                            labelStyle={{ color: '#64748b', fontWeight: 'bold', marginBottom: '4px' }}
                                        />
                                        <Area type="monotone" dataKey="portata" name="Portata (L/min)" stroke="#2563eb" strokeWidth={3} fillOpacity={1} fill="url(#colorPortata)" activeDot={{ r: 6, strokeWidth: 0, fill: '#2563eb' }} />
                                    </AreaChart>
                                </ResponsiveContainer>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
